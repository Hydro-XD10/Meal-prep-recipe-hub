<!DOCTYPE html>
<html>
<head>
    <title>Delete Recipe</title>
</head>
<body>

<h1>Delete Recipe</h1>
<p>Are you sure you want to delete "{{ recipe.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<p><a href="{% url 'recipe_detail' recipe.id %}">Cancel</a></p>

</body>
</html>
