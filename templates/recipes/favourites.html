{% extends 'base.html' %}

{% block title %}My Favourites{% endblock %}

{% block content %}
<h1 class="mb-4">My Favourite Recipes</h1>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for recipe in recipes %}
        {% include 'includes/recipe_card.html' %}
    {% empty %}
        <div class="col-12">
            <div class="alert alert-info">You have no favourite recipes yet.</div>
        </div>
    {% endfor %}
</div>
{% endblock %}
